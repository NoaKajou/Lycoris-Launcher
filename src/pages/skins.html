
<link rel="stylesheet" href="../style/skins.css">
<h2>Mon Skin Minecraft</h2>
<div class="skins-container">
  <!-- Skin du joueur actuel (à droite) -->
  <div class="skin-current-section">
    <canvas id="skinCanvas" width="300" height="400"></canvas>
    <div class="skin-controls">
      <label>Modèle :
        <select id="modelSelect">
          <option value="classic">Classic</option>
          <option value="slim">Slim</option>
        </select>
      </label>
      <input type="file" id="skinFileInput" accept=".png">
      <button id="testTokenBtn">Tester le token</button>
    </div>
    <div id="tokenTestResult"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:0.5em;">
      <div id="currentSkinInfo" class="skin-current-info"></div>
      <button id="applySkinBtn">Appliquer ce skin</button>
    </div>
    <div id="skinStatus"></div>
  </div>
  <!-- Historique des skins (à gauche) -->
  <div class="skin-gallery-section">
    <div class="skin-gallery-title">Historique des skins</div>
    <div id="skinGallery"></div>
  </div>
</div>
<!-- La logique skinview3d et skin upload est dans js/skins.js -->
