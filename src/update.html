<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mise à jour - Lycoris Launcher</title>
  <link rel="stylesheet" href="style/update.css">
</head>
<body>
  <div class="update-container">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>LYCORIS LAUNCHER</h1>
    <div class="status-text" id="statusText">Vérification des mises à jour...</div>
    
    <div class="spinner" id="spinner"></div>
    
    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
    
    <div class="file-list" id="fileList" style="display: none;"></div>
  </div>

  <script>
    const statusText = document.getElementById('statusText');
    const spinner = document.getElementById('spinner');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const fileList = document.getElementById('fileList');

    window.electronAPI.onUpdateStatus((data) => {
      statusText.textContent = data.message;
      
      if (data.type === 'checking') {
        spinner.style.display = 'block';
        progressContainer.style.display = 'none';
      }
      
      if (data.type === 'version') {
        if (data.hasUpdate) {
          statusText.textContent = `Nouvelle version ${data.version} disponible`;
        } else {
          statusText.textContent = 'Version à jour';
        }
      }
      
      if (data.type === 'progress') {
        spinner.style.display = 'none';
        progressContainer.style.display = 'block';
        progressBar.style.width = data.percent + '%';
        progressText.textContent = `${data.current}/${data.total} fichiers vérifiés`;
      }
      
      if (data.type === 'file') {
        fileList.style.display = 'block';
        const item = document.createElement('div');
        item.className = 'file-item ' + data.status;
        item.textContent = data.path + (data.status === 'repair' ? ' (réparé)' : '');
        fileList.appendChild(item);
        fileList.scrollTop = fileList.scrollHeight;
      }
      
      if (data.type === 'complete') {
        spinner.style.display = 'none';
        statusText.textContent = 'Mise à jour terminée !';
        progressBar.style.width = '100%';
        setTimeout(() => {
          window.electronAPI.updateComplete();
        }, 1500);
      }
      
      if (data.type === 'error') {
        spinner.style.display = 'none';
        statusText.textContent = 'Erreur : ' + data.message;
        statusText.style.color = '#e74c3c';
      }
    });
  </script>
</body>
</html>
